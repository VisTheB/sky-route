server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "
        script-src 'self' https://mc.yandex.ru https://yastatic.net;
        connect-src https://mc.yandex.ru wss://mc.yandex.ru;
        img-src https://mc.yandex.ru;
        child-src blob: https://mc.yandex.ru;
        frame-src blob: https://mc.yandex.ru;
    " always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
